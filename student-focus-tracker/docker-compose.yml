version: '3.8'

services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - JWT_SECRET_KEY=your-jwt-secret
      - MAIL_USERNAME=your-email@gmail.com
      - MAIL_PASSWORD=your-email-password
      - ADMIN_PASSWORD=admin123
    depends_on:
      - mongo

  mongo:
    image: mongo:5.0
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: